    <title>{{page_name}}</title>
</head>
<body>
    {% if (nums | length) % 2 == 0 %}
        <h1>A számok száma páros.</h1>
    {% else %}
        <h1>A számok száma páratlan.</h1>
    {% endif %}

        <li>{{ num }}</li>
    {% endfor %}
    </ul>
    <b>Összesen: {{(nums | length)}} darab szám.</b>
</body>
</html>
