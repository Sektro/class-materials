{% extends "layout.html" %}
{% block content %}
<h2>Hallgató módosítása</h2>
<form method="post">
    <label>Név:</label><br>
    <input type="text" name="name" value="{{ student.name }}" required><br>

    <button type="submit">Mentés</button>
</form>
{% endblock %}
