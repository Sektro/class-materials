{% extends "layout.html" %}
{% block content %}
<h2>Hallgatók</h2>
<ul>
    {% for student in students %}
        <li>
            <a href="{{ url_for('student_courses', student_id=student.id) }}">{{ student.name }}</a> – {{ student.email }}
            | <a href="{{ url_for('edit_student', student_id=student.id) }}">✏️</a>
            <a href="{{ url_for('delete_student', student_id=student.id) }}" onclick="return confirm('Biztos törlöd?')">🗑️</a>
        </li>
    {% else %}
        <li>Nincs hallgató</li>
    {% endfor %}
</ul>
{% endblock %}
