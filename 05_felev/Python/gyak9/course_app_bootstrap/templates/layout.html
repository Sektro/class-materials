<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Kurzus Nyilvántartó</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
    <h1 class="mb-4">Kurzus Nyilvántartó</h1>
    <nav class="mb-3">
        <a class="btn btn-outline-primary btn-sm" href="{{ url_for('index') }}">Főoldal</a>
        <a class="btn btn-outline-primary btn-sm" href="{{ url_for('courses') }}">Kurzusok</a>
        <a class="btn btn-outline-success btn-sm" href="{{ url_for('add_course') }}">Új kurzus</a>
        <a class="btn btn-outline-primary btn-sm" href="{{ url_for('students') }}">Hallgatók</a>
        <a class="btn btn-outline-success btn-sm" href="{{ url_for('add_student') }}">Új hallgató</a>
        <a class="btn btn-outline-success btn-sm" href="{{ url_for('add_instructor') }}">Új oktató</a>
        <a class="btn btn-outline-warning btn-sm" href="{{ url_for('enroll_student') }}">Hallgató hozzárendelése</a>
    </nav>
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
