<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Első saját weboldalam</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background: #fff;
    }

    .logo {
      margin-bottom: 30px;
    }

    .logo img {
      width: 272px;
      height: auto;
    }

    .search-box {
      display: inline-block;
      width: 580px;
      padding: 10px;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      box-shadow: none;
      font-size: 16px;
    }

    .buttons {
      margin-top: 30px;
    }

    .btn {
      background-color: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      font-size: 14px;
      margin: 11px 4px;
      padding: 10px 20px;
      cursor: pointer;
    }

    .btn:hover {
      border: 1px solid #c6c6c6;
    }
  </style>
</head>
<body>
  <div class="logo">
    <h1>Első saját weboldalam</h1>
  </div>
</body>
</html>
